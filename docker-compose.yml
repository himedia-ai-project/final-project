  #     SPRING_DATASOURCE_DRIVER: com.mysql.cj.jdbc.Driver
  #     SPRING_DATASOURCE_USERNAME: root
  #     SPRING_DATASOURCE_PASSWORD: 1234
  #   networks:
  #     - container_network

  fastapi:
    build:
      context: ./backend/fastapi
      dockerfile: Dockerfile
    restart: always
    ports:
      - 8000:8000
    networks:
      - container_network

