# version: "3.8"

services:
  db:
    image: postgres:13
    container_name: postgresql
    environment:
      POSTGRES_USER: postgre
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  pgvector:
    image: ankane/pgvector:latest
    container_name: pgvector
    environment:
      POSTGRES_USER: postgre # db와 동일한 설정
      POSTGRES_PASSWORD: 1234 # db와 동일한 설정
      POSTGRES_DB: test
    depends_on:
      - db
    networks:
      - backend

  # backend:
